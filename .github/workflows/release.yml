name: Publish DJ Agent Desktop release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
          cache: pip
          cache-dependency-path: python-engine/requirements.txt

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install and validate
        shell: pwsh
        run: |
          npm ci
          npm run lint
          npm test
          npm run build
          python -m pip install -r python-engine/requirements.txt
          python -m compileall -q python-engine
          python python-engine/test_engine.py

      - name: Build Python sidecar
        shell: pwsh
        run: |
          npm run sidecar:build
          if (-not (Test-Path "src-tauri/icons/icon.ico")) {
            npx tauri icon "assets/app-icon.svg"
          }

      - name: Build, sign, and publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npx tauri
          tagName: v__VERSION__
          releaseName: DJ Agent Desktop v__VERSION__
          releaseBody: "Install this release once; future signed updates can be downloaded from Settings > Updates."
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          releaseAssetNamePattern: DJAgentSetup[ext]
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: DJAgentSetup
