name: Build Windows installer

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "assets/**"
      - "python-engine/**"
      - "scripts/**"
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - ".github/workflows/windows-installer.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
          cache: pip
          cache-dependency-path: python-engine/requirements.txt

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Validate frontend
        run: |
          npm run lint
          npm test
          npm run build

      - name: Validate Python engine
        shell: pwsh
        run: |
          python -m pip install -r python-engine/requirements.txt
          python -m compileall -q python-engine
          python python-engine/test_engine.py

      - name: Build DJAgentSetup.exe
        run: npm run tauri:build

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: DJAgentSetup
          path: release/DJAgentSetup.exe
          if-no-files-found: error
          retention-days: 30
